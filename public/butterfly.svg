<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f7f4" />
  
  <!-- Ambient Gradients -->
  <defs>
    <radialGradient id="pinkAmbient" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ca006c" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#f8f7f4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="purpleAmbient" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#800080" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#f8f7f4" stop-opacity="0" />
    </radialGradient>

    <!-- Path Line Gradient -->
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#ca006c" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ca006c" stop-opacity="0.6" />
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#1E293B" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#pinkAmbient)" />
  <rect width="1200" height="800" fill="url(#purpleAmbient)" />

  <!-- Main Title -->
  <text x="600" y="100" font-size="36" font-weight="500" fill="#1E293B" text-anchor="middle" letter-spacing="-0.5">
    The Butterfly Effect of
  </text>
  <text x="600" y="150" font-size="44" font-weight="600" fill="#ca006c" text-anchor="middle" letter-spacing="-1">
    Digital Transformation.
  </text>
  
  <!-- Subtitle -->
  <foreignObject x="250" y="180" width="700" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 18px; color: rgba(30,41,59,0.7); text-align: center; font-weight: 300; line-height: 1.6;">
      Every strong digital experience starts with understanding friction, evolves through strategic design, and transforms into measurable growth.
    </div>
  </foreignObject>

  <!-- Connection Path -->
  <!-- Similar to the website's path: M150,350 C450,350 350,600 600,600 C850,600 750,350 1050,350 -->
  <path d="M 200,450 C 400,450 400,550 600,550 C 800,550 800,350 1000,350" 
        fill="none" stroke="url(#pathGradient)" stroke-width="4" stroke-dasharray="8 8" />

  <!-- Phase 1: Caterpillar -->
  <g transform="translate(200, 450)">
    <circle cx="0" cy="0" r="16" fill="#f8f7f4" stroke="#1E293B" stroke-opacity="0.2" stroke-width="2" />
    <circle cx="0" cy="0" r="8" fill="#1E293B" fill-opacity="0.2" />
    
    <g transform="translate(-160, -180)">
      <rect x="0" y="0" width="320" height="150" rx="20" fill="#ffffff" filter="url(#dropShadow)" />
      <text x="30" y="40" font-size="12" font-weight="600" fill="#1E293B" fill-opacity="0.5" letter-spacing="1">PHASE 01</text>
      <text x="260" y="45" font-size="28">🐛</text>
      <text x="30" y="70" font-size="20" font-weight="600" fill="#1E293B">Friction &amp; Discovery</text>
      <foreignObject x="30" y="85" width="260" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 13px; color: rgba(30,41,59,0.6); line-height: 1.5;">
          Every project begins by identifying hidden UX problems, behavioral friction, trust gaps, and conversion blockers.
        </div>
      </foreignObject>
    </g>
  </g>

  <!-- Phase 2: Cocoon -->
  <g transform="translate(600, 550)">
    <circle cx="0" cy="0" r="16" fill="#f8f7f4" stroke="#ca006c" stroke-opacity="0.5" stroke-width="2" />
    <circle cx="0" cy="0" r="8" fill="#ca006c" fill-opacity="0.5" />
    
    <g transform="translate(-160, 40)">
      <rect x="0" y="0" width="320" height="150" rx="20" fill="#ffffff" filter="url(#dropShadow)" />
      <text x="30" y="40" font-size="12" font-weight="600" fill="#ca006c" fill-opacity="0.7" letter-spacing="1">PHASE 02</text>
      <text x="260" y="45" font-size="28">🪹</text>
      <text x="30" y="70" font-size="20" font-weight="600" fill="#1E293B">Strategy &amp; System</text>
      <foreignObject x="30" y="85" width="260" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 13px; color: rgba(30,41,59,0.6); line-height: 1.5;">
          Insights are transformed into structure. Information architecture, user flows, and content hierarchy are redesigned.
        </div>
      </foreignObject>
    </g>
  </g>

  <!-- Phase 3: Butterfly -->
  <g transform="translate(1000, 350)">
    <circle cx="0" cy="0" r="24" fill="#f8f7f4" stroke="#ca006c" stroke-opacity="0.9" stroke-width="3" />
    <circle cx="0" cy="0" r="12" fill="#ca006c" fill-opacity="0.9" />
    
    <g transform="translate(-160, -180)">
      <rect x="0" y="0" width="320" height="150" rx="20" fill="#ffffff" filter="url(#dropShadow)" />
      <text x="30" y="40" font-size="12" font-weight="600" fill="#800080" fill-opacity="0.8" letter-spacing="1">PHASE 03</text>
      <text x="260" y="45" font-size="28">🦋</text>
      <text x="30" y="70" font-size="20" font-weight="600" fill="#1E293B">Growth &amp; Transformation</text>
      <foreignObject x="30" y="85" width="260" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 13px; color: rgba(30,41,59,0.6); line-height: 1.5;">
          The final experience becomes intuitive and conversion-focused. Beautiful interfaces meet measurable business growth.
        </div>
      </foreignObject>
    </g>
  </g>

  <!-- Bottom Quote -->
  <text x="600" y="750" font-size="20" font-family="Georgia, serif" font-style="italic" fill="#1E293B" fill-opacity="0.4" text-anchor="middle">
    "Good design is not decoration. It is transformation."
  </text>
</svg>
